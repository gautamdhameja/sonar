services:
  meilisearch:
    image: getmeili/meilisearch:v1.13
    command: ["meilisearch", "--master-key", "${SONAR_MEILI_MASTER_KEY:?Set SONAR_MEILI_MASTER_KEY before running the infra-only Compose file.}", "--http-addr", "0.0.0.0:7700"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - sonar-meili:/meili_data

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - sonar-qdrant:/qdrant/storage

volumes:
  sonar-meili:
  sonar-qdrant:
