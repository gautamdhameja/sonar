services:
  meilisearch:
    image: getmeili/meilisearch:v1.13
    command: ["meilisearch", "--master-key", "masterKey", "--http-addr", "0.0.0.0:7700"]
    restart: unless-stopped
    ports:
      - "7700:7700"
    volumes:
      - sonar-meili:/meili_data

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - sonar-qdrant:/qdrant/storage

  ollama:
    image: ollama/ollama:0.12.10
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - sonar-ollama:/root/.ollama

volumes:
  sonar-meili:
  sonar-qdrant:
  sonar-ollama:
