services:
  api:
    build:
      context: .
    image: sonar-api:local
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      SONAR_API_HOST: 0.0.0.0
      SONAR_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001,http://localhost:3111,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:3001,http://127.0.0.1:3111,http://127.0.0.1:5173,http://tauri.localhost,tauri://localhost
      SONAR_API_TOKEN: ${SONAR_API_TOKEN:-sonar-local-dev-token}
      SONAR_DATA_DIR: /data
      SONAR_DB_PATH: /data/projects.db
      SONAR_ALLOWED_REPO_ROOTS: /workspace/repos
      SONAR_MEILI_HOST: http://meilisearch:7700
      SONAR_MEILI_API_KEY: ${SONAR_MEILI_MASTER_KEY:-${SONAR_API_TOKEN:-sonar-local-dev-token}}
      SONAR_QDRANT_HOST: qdrant
      SONAR_QDRANT_PORT: 6333
      SONAR_QDRANT_VECTOR_SIZE: 768
      SONAR_CHAT_API_KEY: not-needed
      SONAR_EMBEDDING_PROVIDER: openai
      SONAR_EMBEDDING_API_KEY: not-needed
    models:
      chat_model:
        endpoint_var: SONAR_CHAT_BASE_URL
        model_var: SONAR_CHAT_MODEL
      embedding_model:
        endpoint_var: SONAR_EMBEDDING_BASE_URL
        model_var: SONAR_EMBEDDING_MODEL
    volumes:
      - sonar-data:/data
      - sonar-repos:/workspace/repos
    depends_on:
      - meilisearch
      - qdrant

  meilisearch:
    image: getmeili/meilisearch:v1.13
    command: ["meilisearch", "--master-key", "${SONAR_MEILI_MASTER_KEY:-${SONAR_API_TOKEN:-sonar-local-dev-token}}", "--http-addr", "0.0.0.0:7700"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - sonar-meili:/meili_data

  qdrant:
    image: qdrant/qdrant:v1.14.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - sonar-qdrant:/qdrant/storage

models:
  chat_model:
    model: ${SONAR_CHAT_MODEL:-hf.co/unsloth/gemma-4-E4B-it-GGUF:UD-Q4_K_XL}
    context_size: 8192
    runtime_flags:
      - "--temp"
      - "0.1"
  embedding_model:
    model: ${SONAR_EMBEDDING_MODEL:-hf.co/nomic-ai/nomic-embed-text-v1.5-GGUF:Q4_K_M}
    context_size: 2048
    runtime_flags:
      - "--embeddings"

volumes:
  sonar-data:
  sonar-repos:
  sonar-meili:
  sonar-qdrant:
